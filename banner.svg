<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="380" viewBox="0 0 1280 380">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@400;700;900&amp;family=M+PLUS+Rounded+1c:wght@400;700;900&amp;display=swap');
    </style>

    <!-- Polka dot pattern for blobs -->
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="1.5" fill="rgba(255,255,255,0.48)"/>
    </pattern>

    <!-- Clip paths for each blob -->
    <clipPath id="blob-tl">
      <ellipse cx="0" cy="60" rx="220" ry="200" transform="rotate(-10 0 60)"/>
    </clipPath>
    <clipPath id="blob-bl">
      <ellipse cx="50" cy="360" rx="200" ry="180" transform="rotate(12 50 360)"/>
    </clipPath>
    <clipPath id="blob-tr">
      <ellipse cx="1280" cy="0" rx="240" ry="210" transform="rotate(-15 1280 0)"/>
    </clipPath>
    <clipPath id="blob-br-sm">
      <ellipse cx="1220" cy="380" rx="130" ry="115" transform="rotate(8 1220 380)"/>
    </clipPath>

    <!-- Card shadow -->
    <filter id="card-shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#3D3530" flood-opacity="0.09"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1280" height="380" fill="#FAF0EB"/>

  <!-- ── Top accent line ── -->
  <rect y="0" width="1280" height="4" fill="url(#grad-line)"/>
  <defs>
    <linearGradient id="grad-line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#A8C9C4"/>
      <stop offset="100%" stop-color="#E8B5B0"/>
    </linearGradient>
  </defs>
  <rect y="0" width="1280" height="4" fill="url(#grad-line)"/>
  <rect y="376" width="1280" height="4" fill="url(#grad-line)"/>

  <!-- ── Blob: top-left (mint) ── -->
  <ellipse cx="0" cy="60" rx="220" ry="200" fill="#9CBFBA" opacity="0.72"
    transform="rotate(-10 0 60)"/>
  <rect x="-220" y="-160" width="440" height="440"
    fill="url(#dots)" clip-path="url(#blob-tl)"/>

  <!-- ── Blob: bottom-left (mint, smaller) ── -->
  <ellipse cx="50" cy="360" rx="200" ry="180" fill="#A8C9C4" opacity="0.55"
    transform="rotate(12 50 360)"/>
  <rect x="-160" y="180" width="420" height="380"
    fill="url(#dots)" clip-path="url(#blob-bl)"/>

  <!-- ── Blob: top-right (pink) ── -->
  <ellipse cx="1280" cy="0" rx="240" ry="210" fill="#E8B5B0" opacity="0.65"
    transform="rotate(-15 1280 0)"/>

  <!-- ── Blob: bottom-right small (pink) ── -->
  <ellipse cx="1220" cy="380" rx="130" ry="115" fill="#E8B5B0" opacity="0.35"
    transform="rotate(8 1220 380)"/>

  <!-- ── UI Mockup card ── -->
  <g filter="url(#card-shadow)">
    <rect x="790" y="38" width="390" height="304" rx="22" fill="white" opacity="0.97"/>
  </g>
  <!-- Card top gradient bar -->
  <rect x="790" y="38" width="390" height="5" rx="3" fill="url(#grad-line)"/>

  <!-- Card header row -->
  <circle cx="826" cy="74" r="9" fill="none" stroke="#A8C9C4" stroke-width="2"/>
  <line x1="826" y1="69" x2="826" y2="74" stroke="#A8C9C4" stroke-width="1.8"/>
  <line x1="826" y1="74" x2="830" y2="78" stroke="#A8C9C4" stroke-width="1.8"/>
  <text x="844" y="79" font-family="'M PLUS Rounded 1c', sans-serif" font-size="15" font-weight="900" fill="#3D3530">Time!Time!</text>

  <!-- Settings gear -->
  <circle cx="1158" cy="74" r="8" fill="none" stroke="#9B8880" stroke-width="1.5" opacity="0.6"/>
  <circle cx="1158" cy="74" r="3" fill="none" stroke="#9B8880" stroke-width="1.5" opacity="0.6"/>

  <!-- Timer card inner -->
  <rect x="808" y="94" width="354" height="90" rx="14" fill="rgba(168,201,196,0.1)"
    stroke="rgba(168,201,196,0.28)" stroke-width="1.5"/>

  <!-- Status pill -->
  <rect x="822" y="104" width="58" height="20" rx="10" fill="rgba(168,201,196,0.22)"/>
  <circle cx="834" cy="114" r="4" fill="#A8C9C4"/>
  <text x="842" y="118" font-family="'M PLUS Rounded 1c', sans-serif" font-size="11" font-weight="700" fill="#6EAAA4">稼働中</text>

  <!-- Timer digits -->
  <text x="985" y="155" font-family="'M PLUS 1', 'M PLUS Rounded 1c', monospace, sans-serif"
    font-size="44" font-weight="900" fill="#3D3530" text-anchor="middle">02:41:17</text>

  <!-- Client name + total -->
  <text x="822" y="177" font-family="'M PLUS Rounded 1c', sans-serif" font-size="12" fill="#9B8880">ハルカ企画</text>
  <text x="820" y="193" font-family="'M PLUS Rounded 1c', sans-serif" font-size="11" fill="#9B8880">今月合計</text>
  <text x="1150" y="193" font-family="'M PLUS Rounded 1c', sans-serif" font-size="12" font-weight="700" fill="#3D3530" text-anchor="end">47:22</text>

  <!-- Divider -->
  <line x1="808" y1="204" x2="1162" y2="204" stroke="#E8E0D8" stroke-width="1"/>

  <!-- Client rows -->
  <rect x="808" y="210" width="354" height="34" rx="10" fill="rgba(168,201,196,0.1)"
    stroke="rgba(168,201,196,0.3)" stroke-width="1.2"/>
  <circle cx="826" cy="227" r="7" fill="#A8C9C4"/>
  <text x="841" y="231" font-family="'M PLUS Rounded 1c', sans-serif" font-size="13" fill="#3D3530">ハルカ企画</text>
  <text x="1150" y="231" font-family="'M PLUS Rounded 1c', sans-serif" font-size="12" fill="#A8C9C4" text-anchor="end">2:34</text>

  <circle cx="826" cy="258" r="7" fill="#E8B5B0"/>
  <text x="841" y="262" font-family="'M PLUS Rounded 1c', sans-serif" font-size="13" fill="#3D3530">ことり堂</text>
  <text x="1150" y="262" font-family="'M PLUS Rounded 1c', sans-serif" font-size="12" fill="#E8B5B0" text-anchor="end">0:48</text>

  <!-- Action buttons -->
  <rect x="808" y="276" width="108" height="34" rx="11" fill="#A8C9C4"/>
  <text x="862" y="298" font-family="'M PLUS Rounded 1c', sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">再開</text>
  <rect x="924" y="276" width="108" height="34" rx="11" fill="none" stroke="#E8B5B0" stroke-width="1.5"/>
  <text x="978" y="298" font-family="'M PLUS Rounded 1c', sans-serif" font-size="13" font-weight="700" fill="#D99AAD" text-anchor="middle">休憩</text>
  <rect x="1040" y="276" width="108" height="34" rx="11" fill="none" stroke="#E8B5B0" stroke-width="1.5"/>
  <text x="1094" y="298" font-family="'M PLUS Rounded 1c', sans-serif" font-size="13" font-weight="700" fill="#D99AAD" text-anchor="middle">終了</text>

  <!-- ── Left side: badge ── -->
  <rect x="158" y="62" width="152" height="28" rx="14"
    fill="white" stroke="rgba(168,201,196,0.6)" stroke-width="1.5"/>
  <circle cx="177" cy="76" r="5" fill="#A8C9C4"/>
  <text x="188" y="81" font-family="'M PLUS Rounded 1c', sans-serif" font-size="12" font-weight="700" fill="#6EAAA4">Chrome 拡張機能</text>

  <!-- ── Main title: Time!Time! in M PLUS 1 ── -->
  <text x="158" y="185" font-family="'M PLUS 1', sans-serif"
    font-size="88" font-weight="900" fill="#3D3530" letter-spacing="-2">Time!Time!</text>

  <!-- ── Tagline with mint highlight ── -->
  <rect x="154" y="208" width="486" height="38" rx="7" fill="#A8C9C4" opacity="0.16"/>
  <text x="158" y="236" font-family="'M PLUS Rounded 1c', sans-serif"
    font-size="23" font-weight="700" fill="#5A9A94">稼働時間を、かわいく。スマートに。</text>

  <!-- ── Feature badges ── -->
  <rect x="158" y="274" width="136" height="26" rx="13" fill="#A8C9C4" opacity="0.28"/>
  <text x="226" y="292" font-family="'M PLUS Rounded 1c', sans-serif" font-size="11"
    font-weight="900" fill="#5A9A94" text-anchor="middle">Google Sheets 連携</text>

  <rect x="302" y="274" width="96" height="26" rx="13" fill="#E8B5B0" opacity="0.35"/>
  <text x="350" y="292" font-family="'M PLUS Rounded 1c', sans-serif" font-size="11"
    font-weight="900" fill="#C88076" text-anchor="middle">ポモドーロ対応</text>

  <rect x="406" y="274" width="80" height="26" rx="13" fill="#A8C9C4" opacity="0.22"/>
  <text x="446" y="292" font-family="'M PLUS Rounded 1c', sans-serif" font-size="11"
    font-weight="900" fill="#5A9A94" text-anchor="middle">54 テーマ</text>

  <rect x="494" y="274" width="78" height="26" rx="13" fill="rgba(200,185,140,0.35)"/>
  <text x="533" y="292" font-family="'M PLUS Rounded 1c', sans-serif" font-size="11"
    font-weight="900" fill="#7a6e4a" text-anchor="middle">無料・β版</text>

  <!-- ── Version ── -->
  <text x="158" y="342" font-family="'M PLUS Rounded 1c', sans-serif"
    font-size="12" fill="#9B8880" opacity="0.75">v2.1.0  —  MV3  —  Chrome Extension</text>

</svg>
